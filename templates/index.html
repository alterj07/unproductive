<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>unproductive</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' electron: 'unsafe-inline'; connect-src 'self' http://localhost:* https://*; img-src 'self' data: blob:;" />
    <style>
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        #video-container {
            position: relative;
            width: 640px;
            height: 480px;
            border: 2px solid #ccc;
            background: #f0f0f0;
        }
        #video-container video,
        #video-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
        }
        #detectionResult {
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>Are we being productive rn?</h1>

    <div style="flex-direction: row;">
        <button onclick="startDetection()">start locking in</button>
        <button onclick="stopDetection()">quit</button>
    </div>

    <canvas id="canvas" width="640" height="480" style="display: none"></canvas>

    <div id="video-container">
        <video id="liveVideo" autoplay muted playsinline></video>
        <img id="detectionResult" />
    </div>

    <script>
        let isDetecting = false;
        let videoStream = null;
        let detectionInterval = null;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const detectionResult = document.getElementById('detectionResult');
        const liveVideo = document.getElementById('liveVideo');

        const FRAME_SEND_INTERVAL = 200;

        async function sendFrameToBackend(imageBase64) {
            const backendUrl = "https://unproductive.onrender.com";

            try {
                const response = await fetch(`${backendUrl}/api/detect`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageBase64 })
                });

                if (response.ok) {
                    const result = await response.json();
                    detectionResult.src = result.annotated_frame;

                    if (result.target_found) {
                        console.log('phone detected');
                        playAlert();
                    }

                    return result;
                } else {
                    console.error('Backend returned error:', response.status);
                }
            } catch (error) {
                console.error('Failed to send frame to backend:', error);
            }
        }

        async function startDetection() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480 }
                });

                liveVideo.srcObject = videoStream;
                await liveVideo.play();

                isDetecting = true;

                detectionInterval = setInterval(() => {
                    ctx.drawImage(liveVideo, 0, 0, canvas.width, canvas.height);

                    canvas.toBlob(blob => {
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            const base64String = reader.result.split(',')[1];
                            sendFrameToBackend(base64String);
                        };
                        reader.readAsDataURL(blob);
                    }, 'image/jpeg', 0.8);

                }, FRAME_SEND_INTERVAL);

                console.log('Detection started');

            } catch (error) {
                console.error('Camera error:', error);
                alert('Cannot access camera: ' + error.message);
            }
        }

        function stopDetection() {
            isDetecting = false;

            if (detectionInterval) {
                clearInterval(detectionInterval);
                detectionInterval = null;
            }

            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }

            liveVideo.srcObject = null;
            detectionResult.src = '';
        }

        function playAlert() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }
    </script>
</body>
</html>
